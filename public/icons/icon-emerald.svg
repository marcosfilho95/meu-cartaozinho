<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Meu Cartãozinho">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F5F0E0"/>
      <stop offset="1" stop-color="#EDE6D2"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#D9B65C"/>
      <stop offset="1" stop-color="#B8892B"/>
    </linearGradient>
  </defs>

  <!-- Fundo off-white cremoso, cantos suaves -->
  <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>

  <!-- Cartão minimalista, traços finos — inspirado no emoji 💳 -->
  <g transform="translate(112 168) rotate(-8 144 88)">
    <!-- Silhueta do cartão -->
    <rect x="0" y="0" width="288" height="176" rx="22" ry="22"
          fill="none" stroke="#0F5132" stroke-width="10"/>

    <!-- Tarja magnética -->
    <rect x="0" y="34" width="288" height="26" fill="#0F5132"/>

    <!-- Chip minimalista -->
    <rect x="30" y="92" width="46" height="34" rx="6" ry="6"
          fill="none" stroke="#B8892B" stroke-width="5"/>
    <line x1="30" y1="109" x2="76" y2="109" stroke="#B8892B" stroke-width="3"/>

    <!-- Linhas de número -->
    <line x1="30" y1="146" x2="118" y2="146" stroke="#0F5132" stroke-width="6" stroke-linecap="round"/>
    <line x1="134" y1="146" x2="188" y2="146" stroke="#0F5132" stroke-width="6" stroke-linecap="round"/>
    <line x1="204" y1="146" x2="258" y2="146" stroke="#0F5132" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- Pequena estrela dourada — acento premium -->
  <circle cx="400" cy="140" r="10" fill="url(#gold)"/>
</svg>
